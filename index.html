<!DOCTYPE html>
<html>
<head>
  <title>Free ALT Text Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Free Image ALT Text Generator</h1>

    <input type="file" id="imageInput" accept="image/*">
    <button onclick="generateAlt()">Generate ALT Text</button>

    <textarea id="result" readonly></textarea>
    <button onclick="copyText()">Copy</button>
  </div>

<script src="script.js"></script>
</body>
</html>
